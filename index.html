<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky AI Studio</title>
    <style>
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #24243e, #0f0c29); 
            color: white; font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 50px 20px; 
        }
        .container { 
            background: rgba(255,255,255,0.1); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px; margin: auto;
        }
        h1 { color: #00d2ff; margin-bottom: 10px; }
        button { 
            background: #e94560; color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; 
            cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.3s; width: 100%;
        }
        button:hover { background: #ff4d6d; transform: scale(1.05); }
        #status { margin-top: 20px; font-size: 14px; color: #00ff88; }
    </style>
</head
